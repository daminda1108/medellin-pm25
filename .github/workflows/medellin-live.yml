name: medellin-live-forecast

on:
  schedule:
    - cron: "13 * * * *"    # hourly: log a WAQI obs snapshot; issue when a new
                            # GEOS-CF run is available (script decides)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: medellin-live
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install --quiet numpy pandas lightgbm requests
      - name: Snapshot obs + issue/score the live forecast
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python live/medellin_live.py
      - name: Commit the scoreboard
        run: |
          git config user.name "medellin-live-bot"
          git config user.email "actions@github.com"
          git add data/live.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "live: medellin $(date -u +%FT%H:%MZ)"
            git pull --rebase origin main
            git push origin main
          fi
